<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure Storage Uploader</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0078d4, #005a9e);
      color: white;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    header svg { width: 36px; height: 36px; }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header small { font-size: .8rem; opacity: .8; display: block; }

    /* ── Layout ── */
    main {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      gap: 1.5rem;
    }

    /* ── Cards ── */
    .card {
      background: white;
      border-radius: 10px;
      padding: 1.5rem;
      box-shadow: 0 1px 6px rgba(0,0,0,.08);
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #0078d4;
      margin-bottom: 1rem;
      padding-bottom: .5rem;
      border-bottom: 2px solid #e2e8f0;
    }

    /* ── Drop Zone ── */
    #drop-zone {
      border: 2.5px dashed #93c5fd;
      border-radius: 10px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      background: #f8fbff;
    }
    #drop-zone.dragover {
      background: #eff8ff;
      border-color: #0078d4;
    }
    #drop-zone svg { width: 48px; height: 48px; color: #93c5fd; margin-bottom: .8rem; }
    #drop-zone p { color: #64748b; font-size: .95rem; }
    #drop-zone strong { color: #0078d4; }

    /* ── Botões upload ── */
    .btn-group {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    button {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .55rem 1.2rem;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    button:active { transform: scale(.97); }
    .btn-primary { background: #0078d4; color: white; }
    .btn-primary:hover { background: #005a9e; }
    .btn-secondary { background: #e2e8f0; color: #334155; }
    .btn-secondary:hover { background: #cbd5e1; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .btn-sm { padding: .3rem .7rem; font-size: .8rem; }

    /* ── Prefix Input ── */
    .prefix-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1rem;
    }
    .prefix-row label { font-size: .85rem; color: #64748b; white-space: nowrap; }
    .prefix-row input {
      flex: 1;
      padding: .45rem .75rem;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: .9rem;
    }
    .prefix-row input:focus {
      outline: none;
      border-color: #0078d4;
      box-shadow: 0 0 0 3px rgba(0,120,212,.15);
    }

    /* ── File List ── */
    #file-list {
      max-height: 220px;
      overflow-y: auto;
      margin-top: .75rem;
    }
    #file-list table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }
    #file-list th {
      text-align: left;
      padding: .4rem .6rem;
      background: #f1f5f9;
      color: #475569;
      position: sticky;
      top: 0;
    }
    #file-list td {
      padding: .35rem .6rem;
      border-bottom: 1px solid #f1f5f9;
      color: #334155;
      word-break: break-all;
    }
    #file-list tr:hover td { background: #f8fbff; }

    /* ── Progress ── */
    #progress-wrap {
      display: none;
      margin-top: 1rem;
    }
    .progress-bar-bg {
      background: #e2e8f0;
      border-radius: 20px;
      height: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0078d4, #38bdf8);
      border-radius: 20px;
      transition: width .3s;
      width: 0%;
    }
    #progress-label {
      font-size: .8rem;
      color: #64748b;
      margin-top: .35rem;
      text-align: right;
    }

    /* ── Log ── */
    #upload-log {
      max-height: 180px;
      overflow-y: auto;
      font-size: .82rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: .6rem .8rem;
      margin-top: .75rem;
      display: none;
    }
    .log-ok    { color: #16a34a; }
    .log-error { color: #dc2626; }
    .log-info  { color: #0078d4; }

    /* ── Blob List ── */
    #blob-table-wrap {
      max-height: 320px;
      overflow-y: auto;
      margin-top: .5rem;
    }
    #blob-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .83rem;
    }
    #blob-table th {
      text-align: left;
      padding: .45rem .6rem;
      background: #f1f5f9;
      color: #475569;
      position: sticky;
      top: 0;
    }
    #blob-table td {
      padding: .4rem .6rem;
      border-bottom: 1px solid #f1f5f9;
      color: #334155;
      word-break: break-all;
    }
    #blob-table tr:hover td { background: #f8fbff; }
    .badge {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: 20px;
      font-size: .75rem;
      background: #dbeafe;
      color: #1d4ed8;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1e293b;
      color: white;
      padding: .75rem 1.2rem;
      border-radius: 8px;
      font-size: .88rem;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      opacity: 0;
      transform: translateY(10px);
      transition: all .3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Hidden inputs ── */
    input[type=file] { display: none; }
  </style>
</head>
<body>
<!-- Header -->
<header>
  <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 24L12 8l6 10 4-6 4 12" stroke="white" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div>
    <h1>Azure Storage Uploader</h1>
    <small>Limite por envio: {{ max_mb }} MB</small>
  </div>
</header>
<main>

  <!-- Upload Card -->
  <div class="card">
    <h2>⬆️ Upload de Arquivos / Diretórios</h2>

    <!-- Prefixo / pasta destino -->
    <div class="prefix-row">
      <label>Pasta destino (prefixo):</label>
      <input id="base-prefix" type="text"
             placeholder="ex: projetos/dados-2024  (opcional)" />
    </div>

    <!-- Drop zone -->
    <div id="drop-zone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Arraste <strong>arquivos ou pastas</strong> aqui</p>
      <p style="margin-top:.3rem">ou use os botões abaixo</p>
    </div>

    <!-- Botões -->
    <div class="btn-group">
      <button class="btn-secondary" onclick="document.getElementById('file-input').click()">
        📄 Selecionar Arquivos
      </button>
      <button class="btn-secondary" onclick="document.getElementById('dir-input').click()">
        📁 Selecionar Diretório
      </button>
      <button class="btn-primary" id="btn-upload" onclick="doUpload()" disabled>
        ☁️ Enviar para Azure
      </button>
      <button class="btn-danger btn-sm" onclick="clearFiles()">🗑 Limpar</button>
    </div>

    <!-- Inputs ocultos -->
    <input type="file" id="file-input" multiple onchange="addFiles(this.files, false)" />
    <input type="file" id="dir-input" multiple webkitdirectory
           onchange="addFiles(this.files, true)" />

    <!-- Lista de arquivos selecionados -->
    <div id="file-list">
      <table id="file-table" style="display:none">
        <thead><tr>
          <th>Caminho relativo</th><th>Tamanho</th>
        </tr></thead>
        <tbody id="file-tbody"></tbody>
      </table>
    </div>

    <!-- Progresso -->
    <div id="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
      <div id="progress-label">0%</div>
    </div>

    <!-- Log de resultados -->
    <div id="upload-log"></div>
  </div>

  <!-- Explorador Card -->
  <div class="card">
    <h2>📂 Arquivos no Storage</h2>
    <div style="display:flex; gap:.5rem; flex-wrap:wrap; align-items:center">
      <input id="search-prefix" type="text"
             placeholder="Filtrar por prefixo..."
             style="padding:.45rem .75rem; border:1px solid #cbd5e1;
                    border-radius:6px; font-size:.9rem; flex:1; min-width:200px"
             onkeydown="if(event.key==='Enter') loadBlobs()" />
      <button class="btn-primary btn-sm" onclick="loadBlobs()">🔍 Listar</button>
      <button class="btn-secondary btn-sm" onclick="loadBlobs('')">♻️ Todos</button>
    </div>
    <div id="blob-table-wrap">
      <table id="blob-table" style="display:none; margin-top:.6rem">
        <thead><tr>
          <th>Nome / Caminho</th>
          <th>Tamanho</th>
          <th>Tipo</th>
          <th>Modificado</th>
          <th></th>
        </tr></thead>
        <tbody id="blob-tbody"></tbody>
      </table>
      <p id="blob-empty" style="color:#94a3b8; font-size:.85rem; margin-top:.5rem; display:none">
        Nenhum arquivo encontrado.
      </p>
    </div>
  </div>
</main>
<!-- Toast -->
<div id="toast"></div>
<script>
  // ── Estado ──────────────────────────────────────────────
  const selectedFiles = [];   // { file: File, path: string }

  // ── Drag & Drop ─────────────────────────────────────────
  const dz = document.getElementById('drop-zone');

  dz.addEventListener('dragover', e => {
    e.preventDefault(); dz.classList.add('dragover');
  });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', async e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    const items = [...e.dataTransfer.items];
    const entries = items.map(i => i.webkitGetAsEntry?.() || null).filter(Boolean);
    for (const entry of entries) await traverseEntry(entry, '');
    renderFileList();
  });

  async function traverseEntry(entry, pathPrefix) {
    if (entry.isFile) {
      const file = await new Promise(res => entry.file(res));
      const relPath = pathPrefix ? `${pathPrefix}/${file.name}` : file.name;
      selectedFiles.push({ file, path: relPath });
    } else if (entry.isDirectory) {
      const reader = entry.createReader();
      let results = [];
      let batch;
      do {
        batch = await new Promise(res => reader.readEntries(res));
        results = results.concat([...batch]);
      } while (batch.length > 0);
      const newPrefix = pathPrefix ? `${pathPrefix}/${entry.name}` : entry.name;
      for (const child of results) await traverseEntry(child, newPrefix);
    }
  }

  // ── Input change ─────────────────────────────────────────
  function addFiles(fileList, isDir) {
    for (const file of fileList) {
      // webkitRelativePath existe para diretório; senão usa o nome
      const relPath = isDir && file.webkitRelativePath
        ? file.webkitRelativePath
        : file.name;
      selectedFiles.push({ file, path: relPath });
    }
    renderFileList();
  }

  // ── Renderiza a lista de arquivos ─────────────────────────
  function renderFileList() {
    const tbody = document.getElementById('file-tbody');
    tbody.innerHTML = '';
    document.getElementById('file-table').style.display =
      selectedFiles.length ? '' : 'none';

    for (const { file, path } of selectedFiles) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${path}</td><td>${fmtSize(file.size)}</td>`;
      tbody.appendChild(tr);
    }
    document.getElementById('btn-upload').disabled = selectedFiles.length === 0;
  }

  function clearFiles() {
    selectedFiles.length = 0;
    document.getElementById('file-table').style.display = 'none';
    document.getElementById('btn-upload').disabled = true;
    document.getElementById('upload-log').style.display = 'none';
    document.getElementById('upload-log').innerHTML = '';
    setProgress(0, '');
    document.getElementById('progress-wrap').style.display = 'none';
  }

  // ── Upload em lotes ──────────────────────────────────────
  const BATCH_SIZE = 10;  // arquivos por requisição

  async function doUpload() {
    if (!selectedFiles.length) return;

    const prefix = document.getElementById('base-prefix').value.trim();
    const log = document.getElementById('upload-log');
    log.innerHTML = '';
    log.style.display = 'block';
    document.getElementById('progress-wrap').style.display = 'block';

    document.getElementById('btn-upload').disabled = true;

    let uploaded = 0, failed = 0;
    const total = selectedFiles.length;

    // Divide em lotes para não sobrecarregar
    for (let i = 0; i < total; i += BATCH_SIZE) {
      const batch = selectedFiles.slice(i, i + BATCH_SIZE);
      const formData = new FormData();
      formData.append('basePrefix', prefix);

      for (const { file, path } of batch) {
        formData.append('files[]', file);
        formData.append('relativePaths[]', path);
      }

      try {
        const resp = await fetch('/api/upload', { method: 'POST', body: formData });
        const data = await resp.json();

        if (resp.ok) {
          uploaded += data.uploaded;
          failed   += data.failed;
          for (const r of data.results)
            addLog(log, `✔ ${r.blob_path}`, 'log-ok');
          for (const e of data.errors)
            addLog(log, `✘ ${e.file} — ${e.error}`, 'log-error');
        } else {
          addLog(log, `Erro: ${data.error || resp.statusText}`, 'log-error');
        }
      } catch (err) {
        addLog(log, `Erro de rede: ${err.message}`, 'log-error');
      }

      const done = Math.min(i + BATCH_SIZE, total);
      setProgress(Math.round((done / total) * 100),
        `${done} / ${total} arquivos processados`);
    }

    setProgress(100, `Concluído — ${uploaded} enviados, ${failed} com erro`);
    addLog(log,
      `──────────────────────────────────────────────`, 'log-info');
    addLog(log,
      `Resultado: ${uploaded} ✔ enviados, ${failed} ✘ com erro`, 'log-info');
    toast(`Upload finalizado: ${uploaded} ok, ${failed} erro(s)`);
    document.getElementById('btn-upload').disabled = false;

    // Atualiza lista de blobs automaticamente
    loadBlobs(prefix || undefined);
  }

  // ── Listagem de blobs ─────────────────────────────────────
  async function loadBlobs(prefix) {
    const p = (prefix !== undefined)
      ? prefix
      : document.getElementById('search-prefix').value.trim();

    const url = `/api/blobs?prefix=${encodeURIComponent(p)}`;
    const resp = await fetch(url);
    const data = await resp.json();

    const tbody = document.getElementById('blob-tbody');
    const table = document.getElementById('blob-table');
    const empty = document.getElementById('blob-empty');
    tbody.innerHTML = '';

    if (!data.blobs || data.blobs.length === 0) {
      table.style.display = 'none';
      empty.style.display = '';
      return;
    }

    table.style.display = '';
    empty.style.display = 'none';

    for (const b of data.blobs) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${b.name}</td>
        <td>${fmtSize(b.size)}</td>
        <td><span class="badge">${b.content_type || '—'}</span></td>
        <td>${b.last_modified ? b.last_modified.substring(0,10) : '—'}</td>
        <td>
          <button class="btn-danger btn-sm"
            onclick="deleteBlob('${b.name.replace(/'/g,"\\'")}')">🗑</button>
        </td>`;
      tbody.appendChild(tr);
    }
    toast(`${data.total} blob(s) encontrado(s)`);
  }

  // ── Excluir blob ──────────────────────────────────────────
  async function deleteBlob(blobPath) {
    if (!confirm(`Excluir "${blobPath}"?`)) return;
    const resp = await fetch('/api/blobs/delete', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ blob_path: blobPath }),
    });
    const data = await resp.json();
    if (resp.ok) {
      toast(`Excluído: ${blobPath}`);
      loadBlobs();
    } else {
      toast(`Erro: ${data.error}`);
    }
  }

  // ── Helpers ───────────────────────────────────────────────
  function fmtSize(bytes) {
    if (bytes === undefined || bytes === null) return '—';
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1024 ** 2) return `${(bytes/1024).toFixed(1)} KB`;
    if (bytes < 1024 ** 3) return `${(bytes/1024**2).toFixed(1)} MB`;
    return `${(bytes/1024**3).toFixed(2)} GB`;
  }

  function addLog(el, msg, cls) {
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = msg;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function setProgress(pct, label) {
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-label').textContent = label;
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
  }

  // Carrega lista ao abrir a página
  loadBlobs('');
</script>
</body>
</html>
